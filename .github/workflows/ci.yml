name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint (ruff)
        working-directory: scripts
        run: python -m ruff check seo_advisor tests

      - name: Run tests (pytest)
        working-directory: scripts
        run: python -m pytest -v

  cli-smoke-test:
    name: CLI smoke test (demo mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run demo scan end-to-end
        working-directory: scripts
        run: python -m seo_advisor.cli demo --out ./ci-demo-report

      - name: Verify report files were generated
        working-directory: scripts
        run: |
          test -f ci-demo-report/report-beginner.md
          test -f ci-demo-report/report.md
          test -f ci-demo-report/report.json
